services:

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile

    env_file:
      - .env

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - ai-platform

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker

    env_file:
      - .env

    volumes:
      - .:/app

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - ai-platform

  postgres:
    image: pgvector/pgvector:pg17

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

    networks:
      - ai-platform

  redis:
    image: redis:8-alpine

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

    restart: unless-stopped

    networks:
      - ai-platform

  pgadmin:
    image: dpage/pgadmin4

    env_file:
      - .env

    ports:
      - "5050:80"

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - pgadmin-data:/var/lib/pgadmin

    restart: unless-stopped

    networks:
      - ai-platform

volumes:
  postgres-data:
  redis-data:
  pgadmin-data:

networks:
  ai-platform:
    driver: bridge