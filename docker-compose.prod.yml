services:

  api:
    image: easydev/ai-platform:${VERSION:-latest}

    restart: always

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    networks:
      - backend

  worker:
    image: easydev/ai-platform:${VERSION:-latest}

    command: python -m packages.worker.main

    restart: always

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    networks:
      - backend

  postgres:
    image: pgvector/pgvector:pg17

    restart: always

    env_file:
      - .env

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]

    networks:
      - backend

  redis:
    image: redis:8-alpine

    restart: always

    command:
      - redis-server
      - --appendonly
      - yes

    volumes:
      - redis-data:/data

    networks:
      - backend

networks:
  backend:

volumes:
  postgres-data:
  redis-data: